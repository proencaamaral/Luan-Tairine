<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5.1 ❤️</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url("foto.jpg") no-repeat center center/cover;
      }

      .overlay {
        background: rgba(0, 0, 0, 0.6);
        padding: 20px;
        border-radius: 20px;
        max-width: 350px;
      }

      h1 {
        font-size: 2.2em;
      }

      .bike {
        font-size: 40px;
        margin: 15px 0;
        animation: moveBike 4s infinite linear;
      }

      button {
        background: white;
        color: #ff4d6d;
        border: none;
        padding: 12px 18px;
        border-radius: 20px;
        font-size: 1em;
        cursor: pointer;
        margin-top: 15px;
      }

      #texto {
        min-height: 120px;
        margin-top: 10px;
        font-size: 1.1em;
        line-height: 1.6;
      }

      #final {
        display: none;
        margin-top: 10px;
        font-weight: bold;
        font-size: 1.2em;
      }

      @keyframes moveBike {
        0% {
          transform: translateX(-60px);
        }
        50% {
          transform: translateX(60px);
        }
        100% {
          transform: translateX(-60px);
        }
      }
    </style>
  </head>

  <body>
    <div class="overlay">
      <h1>Tairine 💖</h1>

      <div id="texto"></div>

      <div class="bike">🚴‍♂️❤️🚴‍♀️</div>

      <button id="btn" onclick="iniciar()">Clica aqui ❤️</button>

      <div id="final">
        Eu te amo, meu amor. E quero continuar pedalando a vida inteira ao seu
        lado. ❤️
      </div>
    </div>

    <audio id="musica" loop>
      <source src="musica.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const mensagens = [
        "5.1… e ainda parece que começou ontem.",
        "Desde aquele dia na adega…",
        'quando você me chamou de "laranja" 🍊',
        "e a gente deu aquele abraço que já parecia destino...",
        "ali eu já sabia que era você.",
        "Hoje a gente pedala junto…",
        "e a vida ficou muito melhor com você.",
      ];

      let i = 0;
      let j = 0;

      function escrever() {
        if (i < mensagens.length) {
          if (j < mensagens[i].length) {
            document.getElementById("texto").innerHTML +=
              mensagens[i].charAt(j);
            j++;
            setTimeout(escrever, 35);
          } else {
            document.getElementById("texto").innerHTML += "<br><br>";
            i++;
            j = 0;
            setTimeout(escrever, 800);
          }
        } else {
          document.getElementById("final").style.display = "block";
        }
      }

      function fadeAudio(audio) {
        audio.volume = 0;
        let vol = 0;
        let fade = setInterval(() => {
          if (vol < 1) {
            vol += 0.05;
            audio.volume = vol;
          } else {
            clearInterval(fade);
          }
        }, 200);
      }

      function iniciar() {
        const audio = document.getElementById("musica");

        audio
          .play()
          .then(() => {
            fadeAudio(audio);
          })
          .catch(() => {
            console.log("bloqueado");
          });

        document.getElementById("btn").style.display = "none";

        escrever();
      }
    </script>
  </body>
</html>
